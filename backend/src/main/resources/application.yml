spring:
  application:
    name: smart-campus-hub
  datasource:
    url: jdbc:h2:mem:campushub;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 15MB
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          # For SSL (port 465)
          # ssl:
          #   enable: true 

# Switch to PostgreSQL for production (see README)
#  datasource:
#    url: jdbc:postgresql://localhost:5432/campushub
#    username: campus
#    password: campus
#    driver-class-name: org.postgresql.Driver

app:
  jwt:
    secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    expiration-ms: 86400000
  google:
    oauth:
      # Same client ID as the web app's OAuth 2.0 Client (used to verify ID tokens)
      client-id: ${GOOGLE_CLIENT_ID:1069854001896-d45qnrj5pjgjkg56ebrb6qtlcl3rcljo.apps.googleusercontent.com}
  upload:
    dir: ${user.home}/campus-hub-uploads
  mail:
    enabled: ${MAIL_ENABLED:true}
    from: ${MAIL_FROM:your-email@gmail.com}
    # Link in verification email (must match your Vite dev server or production URL)
    frontend-base-url: ${APP_FRONTEND_URL:http://localhost:5173}

# Free SMTP (examples): Brevo SMTP, SendGrid SMTP, Gmail app password — set SPRING_MAIL_* + MAIL_ENABLED=true

server:
  port: 8080

logging:
  level:
    com.campus.hub: INFO
